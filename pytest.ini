[pytest]
# Treat warnings as errors so regressions (e.g. Pydantic field issues) fail
# loudly. Ignore UserWarnings (e.g. Starlette's TestClient warning that it uses
# `httpx` rather than `httpx2`, which subclasses UserWarning) — not actionable in
# our code. Using the built-in `UserWarning` category keeps this version-agnostic
# rather than referencing a Starlette-internal class path.
filterwarnings =
    error
    ignore::UserWarning
