[pytest]
# Treat warnings as errors so regressions (e.g. Pydantic field issues) fail
# loudly. Ignore one known third-party deprecation: Starlette's TestClient warns
# that it uses `httpx` rather than `httpx2` — not actionable in our code.
filterwarnings =
    error
    ignore::starlette.exceptions.StarletteDeprecationWarning
